<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PhotoMap — Vos souvenirs sur la planète</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<script src="https://unpkg.com/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<style>
:root{--ink:#fff;--text:#242424;--text-secondary:#616161;--accent:#0078D4;--accent-dark:#0364B8;--surface:#f5f5f5;--muted:#8a8886;--panel:rgba(255,255,255,.97);--border:rgba(0,0,0,.08);--border-accent:rgba(0,120,212,.3);--danger:#d13438;--shadow:rgba(0,0,0,.08);--font-ui:'Segoe UI',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;--marker-size:88px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-ui);background:var(--ink);color:var(--text);height:100vh;height:100dvh;overflow:hidden;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
#topbar{position:fixed;top:0;left:0;right:0;z-index:1000;height:calc(56px + env(safe-area-inset-top,0px));padding-top:env(safe-area-inset-top,0px);background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding-left:max(24px,env(safe-area-inset-left,0px));padding-right:max(24px,env(safe-area-inset-right,0px));gap:16px;backdrop-filter:blur(12px);box-shadow:0 1px 4px var(--shadow)}
.logo{font-size:1.35rem;font-weight:600;letter-spacing:-.01em;flex-shrink:0}.logo span{color:var(--accent)}
.tagline{font-size:.75rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;border-left:1px solid var(--border);padding-left:16px;flex-shrink:0}
#topbar-right{margin-left:auto;display:flex;gap:12px;align-items:center;flex-shrink:1;min-width:0;overflow:hidden}
#stats-pill{font-size:.75rem;color:var(--accent);background:rgba(0,120,212,.08);border:1px solid var(--border-accent);padding:4px 12px;border-radius:20px;display:none;white-space:nowrap}
#scan-status{display:none;align-items:center;gap:8px;font-size:.72rem;color:var(--text-secondary);background:var(--surface);border:1px solid var(--border);padding:4px 12px;border-radius:20px;white-space:nowrap;position:relative;overflow:hidden}
#scan-status.visible{display:flex}
#scan-status-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:sp 1.5s ease-in-out infinite}
#scan-status.done #scan-status-dot{background:#2ea043;animation:none}
#scan-status.error #scan-status-dot{background:var(--danger);animation:none}
@keyframes sp{0%,100%{opacity:1}50%{opacity:.3}}
#scan-status-text{overflow:hidden;text-overflow:ellipsis}#scan-status-count{font-weight:600;color:var(--accent)}
#scan-progress-bar{position:absolute;bottom:0;left:0;right:0;height:2px}
#scan-progress-fill{height:100%;background:var(--accent);width:0%;transition:width .5s ease}
.btn{font-family:var(--font-ui);font-size:.8rem;font-weight:600;border:none;cursor:pointer;padding:8px 20px;border-radius:6px;transition:all .15s;white-space:nowrap}
#btn-config{width:36px;height:36px;padding:0;border-radius:50%;font-size:1.1rem;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-dark)}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:transparent;color:var(--danger);border:1px solid rgba(209,52,56,.3)}.btn-danger:hover{background:rgba(209,52,56,.08)}
#map{position:fixed;top:calc(56px + env(safe-area-inset-top,0px));left:0;right:0;bottom:0;z-index:1}
.leaflet-tile{filter:saturate(.85) contrast(1.05)}
#map-layer-toggle{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:16px;z-index:500;width:44px;height:44px;border-radius:8px;border:2px solid #fff;background:var(--panel);cursor:pointer;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.2);display:none;padding:0}
#map-layer-toggle.visible{display:block}
#map-layer-toggle img{width:100%;height:100%;object-fit:cover;display:block}
#map-layer-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);color:#fff;font-size:.55rem;text-align:center;padding:1px 0;font-weight:600}
#splash{position:fixed;inset:0;z-index:2000;background:linear-gradient(135deg,#f0f4f8,#fff 50%,#e8f0fe);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:32px;transition:opacity .6s,visibility .6s}
#splash.hidden{opacity:0;visibility:hidden;pointer-events:none}
.splash-globe{width:120px;height:120px;border:2px solid var(--accent);border-radius:50%;position:relative;animation:sg 12s linear infinite;display:flex;align-items:center;justify-content:center}
.splash-globe::before{content:'';position:absolute;inset:8px;border:1px solid var(--border-accent);border-radius:50%;animation:sg 8s linear infinite reverse}
.globe-icon{font-size:3rem}@keyframes sg{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.splash-title{font-size:2.8rem;font-weight:700;text-align:center;line-height:1.1}.splash-title span{color:var(--accent)}
.splash-sub{color:var(--text-secondary);font-size:.95rem;text-align:center;max-width:380px;line-height:1.6}
#btn-login{padding:15px 44px;font-size:.95rem;border-radius:32px;box-shadow:0 4px 18px rgba(0,120,212,.35)}
.splash-note{font-size:.72rem;color:var(--muted);text-align:center;max-width:320px;line-height:1.5}
#loading-overlay{position:fixed;inset:0;z-index:1900;background:rgba(255,255,255,.92);flex-direction:column;align-items:center;justify-content:center;gap:24px;display:none}
#loading-overlay.visible{display:flex}
.progress-bar-wrap{width:300px;height:3px;background:rgba(0,0,0,.08);border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);width:0%;transition:width .4s ease}
#loading-count{font-size:2rem;font-weight:700;color:var(--accent)}
#photo-panel{position:fixed;right:0;top:calc(56px + env(safe-area-inset-top,0px));bottom:0;z-index:500;width:420px;background:var(--panel);border-left:1px solid var(--border);backdrop-filter:blur(16px);box-shadow:-2px 0 12px var(--shadow);transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
#photo-panel.open{transform:translateX(0)}
.panel-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between}
.panel-location{font-size:1.1rem;font-weight:600;line-height:1.3;max-width:250px}
.panel-date{font-size:.72rem;color:var(--accent);letter-spacing:.06em;text-transform:uppercase;margin-top:4px}
.panel-count{font-size:.7rem;color:var(--muted);margin-top:6px}
.btn-close{background:transparent;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:4px 6px;line-height:1;border-radius:4px}.btn-close:hover{color:var(--text);background:var(--surface)}
#panel-photos{flex:1;min-height:0;overflow-y:auto;padding:16px;display:grid;grid-template-columns:repeat(2,1fr);grid-auto-rows:min-content;gap:10px;align-content:start}
#panel-photos::-webkit-scrollbar{width:4px}#panel-photos::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px}
.thumb-card{width:100%;aspect-ratio:1/1;overflow:hidden;border-radius:8px;cursor:pointer;position:relative;background:var(--surface);border:1px solid var(--border);transition:border-color .2s,transform .2s;box-shadow:0 1px 4px var(--shadow)}
.thumb-card:hover{border-color:var(--accent);transform:scale(1.02)}
.thumb-card img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block}
.thumb-card .thumb-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.78),transparent 55%);opacity:0;transition:opacity .2s;display:flex;align-items:flex-end;padding:8px;font-size:.68rem;color:#fff;line-height:1.2}
.thumb-card:hover .thumb-overlay{opacity:1}
#lightbox{position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;padding:8px}
#lightbox.open{display:flex}
.lightbox-media-wrap{position:relative;display:flex;align-items:center;justify-content:center;width:92vw;height:80vh;flex-shrink:1;min-height:0}
#lightbox-img,#lightbox-video{display:none;max-width:100%;max-height:100%;object-fit:contain;border-radius:8px;box-shadow:0 0 80px rgba(0,0,0,.85)}
.hd-badge{position:absolute;top:16px;right:16px;display:none;align-items:center;gap:6px;background:rgba(0,0,0,.6);color:#fff;padding:6px 14px;border-radius:20px;font-size:.75rem;font-weight:600;backdrop-filter:blur(8px);z-index:10}
.hd-badge.visible{display:flex}.hd-badge.done{background:rgba(46,160,67,.7)}
.hd-spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:hs .8s linear infinite}
@keyframes hs{to{transform:rotate(360deg)}}
.lightbox-info{text-align:center;color:rgba(255,255,255,.7);font-size:.82rem;flex-shrink:0}
.lightbox-info strong{display:block;font-size:1rem;font-weight:600;color:#fff;margin-bottom:4px}
#lightbox-actions{margin-top:10px;display:flex;justify-content:center}
#lightbox-open-onedrive{display:inline-flex;align-items:center;gap:8px;font-size:.88rem;font-weight:600;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:28px;padding:11px 26px;backdrop-filter:blur(12px);transition:background .15s;cursor:pointer}
#lightbox-open-onedrive:hover{background:rgba(255,255,255,.25)}
.lightbox-nav{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:1.6rem;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3001}
#lightbox-prev{left:20px}#lightbox-next{right:20px}
#lightbox-close{position:fixed;top:24px;right:24px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:1.4rem;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3001}
.photo-marker-wrap{display:flex;flex-direction:column;align-items:center;cursor:pointer;filter:drop-shadow(0 4px 14px rgba(0,0,0,.35));transition:transform .15s}
.photo-marker-wrap:hover{transform:scale(1.08)}
.photo-marker{width:var(--marker-size);height:var(--marker-size);border-radius:16px;overflow:hidden;border:3px solid #fff;background:#e0e0e0;position:relative;flex-shrink:0}
.photo-marker>img{width:100%!important;height:100%!important;object-fit:cover!important;display:block!important;object-position:center!important}
.photo-marker-count{position:absolute;bottom:5px;left:5px;background:rgba(0,0,0,.55);color:#fff;font-size:12px;font-weight:700;line-height:1;padding:3px 7px;border-radius:9px;pointer-events:none}
.photo-marker-tail{width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:10px solid #fff;margin-top:-2px}
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:none!important;border:none!important;box-shadow:none!important}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background:none!important}
#filter-bar{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);z-index:500;background:var(--panel);border:1px solid var(--border);border-radius:40px;padding:8px 16px;display:none;gap:6px;align-items:center;backdrop-filter:blur(12px);box-shadow:0 2px 12px var(--shadow);max-width:90vw;overflow-x:auto}
#filter-bar.visible{display:flex}#filter-bar::-webkit-scrollbar{display:none}#filter-bar{scrollbar-width:none}
.filter-label{font-size:.7rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;margin-right:4px}
.year-btn{background:transparent;border:1px solid transparent;color:var(--muted);font-family:var(--font-ui);font-size:.78rem;padding:4px 12px;border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap}
.year-btn:hover{color:var(--text);border-color:var(--border)}
.year-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500}
#config-panel{position:fixed;inset:0;z-index:1500;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center}
#config-panel.open{display:flex}
.config-box{background:#fff;border:1px solid var(--border);border-radius:20px;padding:28px;max-width:420px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.config-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.config-box h2{font-size:1.4rem;font-weight:700;margin:0}
.config-close-btn{width:34px;height:34px;padding:0;border-radius:50%;font-size:1rem;display:flex;align-items:center;justify-content:center}
.config-buttons{display:flex;flex-direction:column;gap:12px}
.config-btn{width:100%;padding:14px 24px;border-radius:28px;font-size:.95rem;font-weight:600;text-align:center}
.config-toggle{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-radius:16px;background:var(--surface);border:1px solid var(--border)}
.config-toggle-info{flex:1;min-width:0}
.config-toggle-label{font-size:.88rem;font-weight:500}
.config-toggle-sub{font-size:.72rem;color:var(--muted);margin-top:2px}
.config-toggle-status{font-size:.68rem;color:var(--accent);margin-top:3px;font-weight:500}
.toggle-switch{position:relative;width:46px;height:26px;flex-shrink:0;margin-left:12px}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#ccc;border-radius:26px;cursor:pointer;transition:background .2s}
.toggle-slider::before{content:'';position:absolute;left:3px;top:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle-switch input:checked+.toggle-slider{background:var(--accent)}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(20px)}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:4000;background:#fff;border:1px solid var(--border);padding:10px 20px;border-radius:8px;font-size:.82rem;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90vw;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.12)}
#toast.show{opacity:1}
@media(max-width:600px){
:root{--marker-size:80px}
.tagline{display:none}
#topbar{height:calc(54px + env(safe-area-inset-top,0px));padding-left:max(14px,env(safe-area-inset-left,0px));padding-right:max(14px,env(safe-area-inset-right,0px));gap:8px}
.logo{font-size:1.2rem}
.btn{padding:0;font-size:1.1rem;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0}
#btn-config{font-size:1.2rem}
#stats-pill{font-size:.78rem;padding:5px 10px;max-width:140px;flex-shrink:1;overflow:hidden;text-overflow:ellipsis}
#topbar-right:has(#scan-status.visible) #stats-pill{display:none!important}
#scan-status{font-size:.75rem;padding:5px 10px;gap:6px;max-width:180px}
#map{top:calc(54px + env(safe-area-inset-top,0px))}
#map-layer-toggle{bottom:calc(70px + env(safe-area-inset-bottom,0px));left:12px}
#photo-panel{top:auto;right:0;left:0;bottom:0;width:100%;height:72dvh;border-left:none;border-top:1px solid var(--border);border-radius:20px 20px 0 0;transform:translateY(100%);padding-bottom:env(safe-area-inset-bottom,0px)}
#photo-panel.open{transform:translateY(0)}
.panel-header{padding:18px 18px 14px;position:relative}
.panel-header::before{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:40px;height:4px;background:var(--muted);border-radius:2px;opacity:.5}
.panel-location{max-width:70vw}.btn-close{font-size:1.5rem;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;border-radius:50%}
#panel-photos{grid-template-columns:repeat(3,1fr);gap:8px;padding:12px}.thumb-card{border-radius:10px}
#filter-bar{bottom:calc(14px + env(safe-area-inset-bottom,0px));padding:8px 14px;border-radius:32px;max-width:96vw}
.year-btn{font-size:.82rem;padding:6px 14px;min-height:34px}
#lightbox{padding:0;gap:0}.lightbox-media-wrap{width:100vw;height:70dvh}
#lightbox-img,#lightbox-video{border-radius:0;box-shadow:none}
.lightbox-nav{top:auto;bottom:calc(90px + env(safe-area-inset-bottom,0px));transform:none;width:56px;height:56px;font-size:2rem}
#lightbox-close{top:max(16px,env(safe-area-inset-top,10px));right:16px;width:48px;height:48px;font-size:1.5rem}
.lightbox-info{padding:12px 18px calc(12px + env(safe-area-inset-bottom,0px));width:100%;background:linear-gradient(to top,rgba(0,0,0,.9),transparent)}
#lightbox-open-onedrive{min-width:190px;font-size:.82rem;padding:10px 20px}
#splash{gap:22px;padding:28px}.splash-globe{width:90px;height:90px}.globe-icon{font-size:2.4rem}.splash-title{font-size:2rem}
.splash-sub{font-size:.9rem;max-width:320px}#btn-login{padding:14px 36px;font-size:.95rem}.splash-note{font-size:.75rem;max-width:300px}
.config-box{padding:24px 22px 28px;width:94%;border-radius:24px}.config-btn{font-size:.95rem;padding:15px 24px;min-height:52px}
#toast{bottom:calc(70px + env(safe-area-inset-bottom,0px));font-size:.85rem;border-radius:24px}
.leaflet-control-zoom{margin-bottom:calc(70px + env(safe-area-inset-bottom,0px))!important;margin-right:12px!important}
.leaflet-control-zoom a{width:36px!important;height:36px!important;line-height:36px!important;font-size:1.2rem!important}
.photo-marker{border-radius:14px;border-width:2.5px}
}
@media(max-width:375px){:root{--marker-size:68px}.logo{font-size:1.05rem}#stats-pill{display:none!important}#panel-photos{grid-template-columns:repeat(2,1fr)}.splash-title{font-size:1.7rem}.splash-globe{width:72px;height:72px}.globe-icon{font-size:1.8rem}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15)}
</style>
</head>
<body>
<div id="topbar"><div class="logo">Photo<span>Map</span></div><div class="tagline">Vos souvenirs sur la planète</div><div id="topbar-right"><div id="stats-pill"></div><div id="scan-status" style="display:none"><div id="scan-status-dot"></div><span id="scan-status-text"></span><span id="scan-status-count"></span><div id="scan-progress-bar"><div id="scan-progress-fill"></div></div></div><button class="btn btn-ghost" id="btn-config" style="display:none" title="Configuration">⚙</button></div></div>
<div id="map"></div>
<button id="map-layer-toggle" title="Fond de carte"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 44'%3E%3Crect fill='%23365' width='44' height='44'/%3E%3Ctext x='22' y='28' text-anchor='middle' fill='%23fff' font-size='10'%3E🛰%3C/text%3E%3C/svg%3E" alt=""/><div id="map-layer-label">Satellite</div></button>
<div id="filter-bar"><span class="filter-label">Année</span><button class="year-btn active" data-year="all">Toutes</button></div>
<div id="photo-panel"><div class="panel-header"><div><div class="panel-location" id="panel-location-name">Lieu</div><div class="panel-date" id="panel-date-range"></div><div class="panel-count" id="panel-count"></div></div><button class="btn-close" id="panel-close">✕</button></div><div id="panel-photos"></div></div>
<div id="lightbox"><button id="lightbox-close">✕</button><button class="lightbox-nav" id="lightbox-prev">‹</button><button class="lightbox-nav" id="lightbox-next">›</button><div class="lightbox-media-wrap"><img id="lightbox-img" src="" alt=""/><video id="lightbox-video" controls playsinline></video><div class="hd-badge" id="hd-loader"><div class="hd-spinner"></div><span>HD</span></div><div class="hd-badge done" id="hd-done"><span>✓ HD</span></div></div><div class="lightbox-info"><strong id="lightbox-name"></strong><span id="lightbox-meta"></span><div id="lightbox-actions"><button id="lightbox-open-onedrive">↗ Ouvrir dans OneDrive</button></div></div></div>
<div id="splash"><div class="splash-globe"><div class="globe-icon">🌍</div></div><div class="splash-title">Vos photos,<br><span>sur la planète</span></div><div class="splash-sub">Connectez votre OneDrive pour visualiser vos photos géolocalisées sur une carte interactive.</div><button class="btn btn-primary" id="btn-login">Connecter OneDrive</button><div class="splash-note">Tout est traité localement — aucune donnée envoyée à un tiers.</div></div>
<div id="loading-overlay"><div id="loading-count">0</div><div class="loading-msg" id="loading-msg">Connexion…</div><div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div></div>
<div id="config-panel"><div class="config-box"><div class="config-header"><h2>PhotoMap</h2><button class="btn btn-ghost config-close-btn" id="btn-config-cancel">✕</button></div><div class="config-buttons"><div id="config-connect-wrap"><button class="btn btn-primary config-btn" id="btn-connect">Connexion à OneDrive</button></div><div class="config-toggle"><div class="config-toggle-info"><div class="config-toggle-label">Cache local des vignettes</div><div class="config-toggle-sub" id="cache-toggle-sub"></div><div class="config-toggle-status" id="cache-toggle-status"></div></div><label class="toggle-switch"><input type="checkbox" id="toggle-local-cache"><span class="toggle-slider"></span></label></div><div id="config-rescan-wrap" style="display:none"><button class="btn btn-ghost config-btn" id="btn-full-rescan">↺ Rescan complet</button></div><div id="config-logout-wrap" style="display:none"><button class="btn btn-danger config-btn" id="btn-config-logout">Disconnect &amp; Delete</button></div></div></div></div>
<div id="toast"></div>

<script>
/* PhotoMap v2.3 — Graph API authenticated downloads for thumbnails & HD */
const DB='photomap_db',DBV=2,SM='media',SMT='meta',STH='thumbs';
const CID_DEFAULT='74655b12-46c1-4cdb-be1a-27655fa47677';
const IMG_EXT=new Set('jpg jpeg png heic heif webp gif bmp tiff'.split(' '));
const VID_EXT=new Set('mp4 mov m4v hevc avi webm 3gp mkv'.split(' '));
const FALLBACK="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='4' fill='%23f0f0f0'/%3E%3Ctext x='24' y='30' text-anchor='middle' font-size='20'%3E📷%3C/text%3E%3C/svg%3E";

let ms=null,allP=[],mkrs=[],cg,curY='all',bgRun=false,startRun=false;
let lbP=[],lbI=0,panP=[];
let _db=null,_tk=null,atm=null;
const LC='photomap_local_thumb_cache';
let lc=localStorage.getItem(LC)==='true';
const tUrls=new Map();
let cLayer='standard',stdL,satL;

/* ===== DB ===== */
function odb(){if(_db)return Promise.resolve(_db);return new Promise((y,n)=>{const r=indexedDB.open(DB,DBV);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(SM)){d.createObjectStore(SM,{keyPath:'id'}).createIndex('by_date','date',{unique:false})}if(!d.objectStoreNames.contains(SMT))d.createObjectStore(SMT,{keyPath:'key'});if(!d.objectStoreNames.contains(STH))d.createObjectStore(STH,{keyPath:'id'})};r.onsuccess=()=>{_db=r.result;_db.onclose=()=>{_db=null};_db.onversionchange=()=>{_db.close();_db=null};y(_db)};r.onerror=()=>n(r.error)})}
async function dPut(items){if(!items?.length)return;const d=await odb();await new Promise((y,n)=>{const t=d.transaction(SM,'readwrite'),s=t.objectStore(SM);for(const i of items)s.put({...i,date:i.date?i.date.toISOString():null,fetchedAt:i.fetchedAt||new Date().toISOString()});t.oncomplete=y;t.onerror=()=>n(t.error)})}
async function dAll(){const d=await odb();return new Promise((y,n)=>{const r=d.transaction(SM,'readonly').objectStore(SM).getAll();r.onsuccess=()=>y((r.result||[]).map(i=>({...i,date:i.date?new Date(i.date):null})));r.onerror=()=>n(r.error)})}
async function dClr(){const d=await odb();await new Promise((y,n)=>{const t=d.transaction(SM,'readwrite');t.objectStore(SM).clear();t.oncomplete=y;t.onerror=()=>n(t.error)})}
async function dM(k){const d=await odb();return new Promise((y,n)=>{const r=d.transaction(SMT,'readonly').objectStore(SMT).get(k);r.onsuccess=()=>y(r.result?.value??null);r.onerror=()=>n(r.error)})}
async function dSM(k,v){const d=await odb();await new Promise((y,n)=>{const t=d.transaction(SMT,'readwrite');t.objectStore(SMT).put({key:k,value:v});t.oncomplete=y;t.onerror=()=>n(t.error)})}
async function dDM(k){const d=await odb();await new Promise((y,n)=>{const t=d.transaction(SMT,'readwrite');t.objectStore(SMT).delete(k);t.oncomplete=y;t.onerror=()=>n(t.error)})}
async function dDel(id){const d=await odb();await new Promise((y,n)=>{const t=d.transaction(SM,'readwrite');t.objectStore(SM).delete(id);t.oncomplete=y;t.onerror=()=>n(t.error)})}
async function tPut(id,blob){const d=await odb();await new Promise((y,n)=>{const t=d.transaction(STH,'readwrite');t.objectStore(STH).put({id,blob,at:Date.now()});t.oncomplete=y;t.onerror=()=>n(t.error)})}
async function tIds(){const d=await odb();return new Promise((y,n)=>{const r=d.transaction(STH,'readonly').objectStore(STH).getAllKeys();r.onsuccess=()=>y(new Set(r.result||[]));r.onerror=()=>n(r.error)})}
async function tClr(){const d=await odb();await new Promise((y,n)=>{const t=d.transaction(STH,'readwrite');t.objectStore(STH).clear();t.oncomplete=y;t.onerror=()=>n(t.error)})}
async function tDel(id){const d=await odb();await new Promise((y,n)=>{const t=d.transaction(STH,'readwrite');t.objectStore(STH).delete(id);t.oncomplete=y;t.onerror=()=>n(t.error)})}

/* Load all cached thumb blobs as objectURLs */
async function loadThumbs(){if(!lc)return;const d=await odb();return new Promise((y,n)=>{const r=d.transaction(STH,'readonly').objectStore(STH).openCursor();r.onsuccess=e=>{const c=e.target.result;if(c){const{id,blob}=c.value;if(blob&&!tUrls.has(id))try{tUrls.set(id,URL.createObjectURL(blob))}catch{}c.continue()}else y()};r.onerror=()=>n(r.error)})}

function thumbSrc(p){if(lc&&tUrls.has(p.id))return tUrls.get(p.id);return p.thumbnailUrl||FALLBACK}

/*
 * ===== KEY FIX: fetchThumbBlob =====
 * Downloads thumbnail bytes using Graph API WITH auth token.
 * This endpoint follows redirects to the actual image and includes
 * the auth header, so it works regardless of URL expiry.
 *
 * GET /me/drive/items/{id}/thumbnails/0/medium/content
 * Returns: 302 → image bytes
 *
 * We use the thumbnails metadata endpoint to get a fresh signed URL,
 * then fetch that URL (which is freshly signed, not expired).
 */
async function fetchThumbBlob(photoId){
  if(!_tk)return null;
  try{
    /* Get a FRESH thumbnail URL from Graph API (with auth) */
    const meta=await gql('https://graph.microsoft.com/v1.0/me/drive/items/'+photoId+'/thumbnails',_tk);
    const url=meta.value?.[0]?.medium?.url||meta.value?.[0]?.large?.url||meta.value?.[0]?.small?.url;
    if(!url)return null;
    /* This URL is freshly signed — fetch it immediately */
    const res=await fetch(url);
    if(!res.ok)return null;
    return await res.blob();
  }catch{return null}
}

/*
 * ===== KEY FIX: fetchFullUrl =====
 * Gets a fresh downloadUrl for the full-res image.
 */
async function fetchFullUrl(photoId){
  if(!_tk)return null;
  try{
    const d=await gql('https://graph.microsoft.com/v1.0/me/drive/items/'+photoId+'?$select=id,@microsoft.graph.downloadUrl,webUrl',_tk);
    return{downloadUrl:d['@microsoft.graph.downloadUrl']||null,webUrl:d.webUrl||null};
  }catch{return null}
}

/* Download and cache a thumb */
async function cacheThumb(photo){
  const blob=await fetchThumbBlob(photo.id);
  if(!blob)return false;
  await tPut(photo.id,blob);
  tUrls.set(photo.id,URL.createObjectURL(blob));
  return true;
}

let _tcRun=false;
async function bgCache(){
  if(!lc||_tcRun)return;_tcRun=true;
  try{
    const have=await tIds();
    const need=allP.filter(p=>!have.has(p.id));
    const total=allP.length;let done=have.size;
    cStat(done,total);
    for(let i=0;i<need.length;i++){
      if(!lc)break;
      if(await cacheThumb(need[i]))done++;
      if(i%5===0)cStat(done,total);
      if(i%10===9)await new Promise(r=>setTimeout(r,50));
    }
    cStat(done,total);
  }catch(e){console.warn('bgCache err',e)}
  finally{_tcRun=false}
}
function cStat(done,total){const el=document.getElementById('cache-toggle-status');if(!el||!lc){if(el)el.textContent='';return}if(!total)return;el.textContent=done>=total?`✓ ${done} vignettes en cache`:`⟳ ${done} / ${total} en cours…`}

/* ===== MAP ===== */
const map=L.map('map',{center:[20,0],zoom:2,zoomControl:false,minZoom:2,worldCopyJump:true});
stdL=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM',maxZoom:19,noWrap:false});
satL=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri',maxZoom:19,noWrap:false});
stdL.addTo(map);L.control.zoom({position:'bottomright'}).addTo(map);
document.getElementById('map-layer-toggle').addEventListener('click',()=>{const l=document.getElementById('map-layer-label');if(cLayer==='standard'){map.removeLayer(stdL);satL.addTo(map);cLayer='satellite';l.textContent='Plan'}else{map.removeLayer(satL);stdL.addTo(map);cLayer='standard';l.textContent='Satellite'}});
function msz(){return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--marker-size'))||88}

cg=L.markerClusterGroup({showCoverageOnHover:false,maxClusterRadius:50,spiderfyOnMaxZoom:true,disableClusteringAtZoom:18,
  iconCreateFunction(c){const n=c.getChildCount(),f=c.getAllChildMarkers()[0]?._pd,s=f?thumbSrc(f):FALLBACK,sz=msz();
    return L.divIcon({className:'',html:`<div class="photo-marker-wrap"><div class="photo-marker"><img src="${s}" loading="lazy" onerror="this.src='${FALLBACK}'"/><div class="photo-marker-count">${n}</div></div><div class="photo-marker-tail"></div></div>`,iconSize:[sz,sz+12],iconAnchor:[sz/2,sz+12]})}
});map.addLayer(cg);

/* ===== UI ===== */
let tt;function toast(m,d=3000){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),d)}
function ssc(st,tx,ct,pc){const e=document.getElementById('scan-status'),t=document.getElementById('scan-status-text'),c=document.getElementById('scan-status-count'),f=document.getElementById('scan-progress-fill');if(st==='hidden'){e.style.display='none';e.classList.remove('visible','done','error');return}e.style.display='flex';e.classList.add('visible');e.classList.remove('done','error');if(st==='done')e.classList.add('done');if(st==='error')e.classList.add('error');if(tx)t.textContent=tx;if(ct!=null)c.textContent=ct;if(pc!=null)f.style.width=Math.min(pc,100)+'%'}
let _sdt;function sDone(c,d){ssc('done','Terminé',d||c+' médias',100);clearTimeout(_sdt);_sdt=setTimeout(()=>ssc('hidden'),5000)}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function isV(n=''){return VID_EXT.has(n.split('.').pop()?.toLowerCase())}

function updateUI(fit){
  if(!allP?.length)return;bldYr(allP);
  const f=curY==='all'?allP:allP.filter(p=>p.date&&p.date.getFullYear()==curY);
  rndr(f);uSt(f.length);
  if(fit&&mkrs.length)map.fitBounds(L.featureGroup(mkrs).getBounds().pad(.15),{maxZoom:14});
  document.getElementById('btn-config').style.display='inline-flex';
  document.getElementById('map-layer-toggle').classList.add('visible');
  setTimeout(refreshVis,800);
}

/* ===== AUTH ===== */
async function initMs(cid){ms=new window.msal.PublicClientApplication({auth:{clientId:cid,authority:'https://login.microsoftonline.com/common',redirectUri:location.origin+location.pathname},cache:{cacheLocation:'localStorage'}});await ms.initialize()}
async function getTk(){const a=ms.getAllAccounts();try{return(await ms.acquireTokenSilent({scopes:['Files.Read','User.Read'],account:a[0]})).accessToken}catch{await ms.acquireTokenRedirect({scopes:['Files.Read','User.Read'],account:a[0]});return null}}
async function freshTk(){const a=ms.getAllAccounts();try{return(await ms.acquireTokenSilent({scopes:['Files.Read','User.Read'],account:a[0],forceRefresh:true})).accessToken}catch{await ms.acquireTokenRedirect({scopes:['Files.Read','User.Read'],account:a[0]});return null}}

async function gql(url,tk,re=false){
  const r=await fetch(url,{headers:{Authorization:'Bearer '+tk}});
  if(r.status===401&&!re){const f=await freshTk();if(f){_tk=f;return gql(url,f,true)}return null}
  if(r.status===401)throw new Error('Session expirée');
  if(r.status===429){await new Promise(y=>setTimeout(y,parseInt(r.headers.get('Retry-After')||'5')*1000));return gql(url,tk)}
  if(!r.ok)throw new Error('Graph '+r.status);
  return r.json();
}
function isMF(i){if(!i.file||!i.name)return false;const e=i.name.split('.').pop()?.toLowerCase();return IMG_EXT.has(e)||VID_EXT.has(e)}
async function getThUrl(id){try{const d=await gql('https://graph.microsoft.com/v1.0/me/drive/items/'+id+'/thumbnails',_tk);return d.value?.[0]?.medium?.url||d.value?.[0]?.large?.url||d.value?.[0]?.small?.url||null}catch{return null}}

/* Refresh + update on visible markers that have stale thumbnails */
const _rq=new Set(),_ri=new Set();let _rp=false;
function qR(pid,imgEl){if(!_tk||_ri.has(pid))return;_rq.add(pid);if(!_rp){_rp=true;setTimeout(pQ,50)}}
async function pQ(){
  if(!_rq.size){_rp=false;return}
  const batch=[..._rq].slice(0,4);
  await Promise.allSettled(batch.map(async id=>{
    _rq.delete(id);_ri.add(id);
    const p=allP.find(x=>x.id===id);if(!p){_ri.delete(id);return}
    try{
      /* Get fresh thumbnail URL */
      const tu=await getThUrl(id);
      if(tu){p.thumbnailUrl=tu;p.fetchedAt=new Date().toISOString();await dPut([p])}
      if(lc){await cacheThumb(p)}
      /* Update all visible img elements with this photo id */
      const newSrc=thumbSrc(p);
      document.querySelectorAll(`img[data-pid="${id}"]`).forEach(img=>{img.onerror=null;img.src=newSrc;img.onerror=function(){this.src=FALLBACK}});
      /* Update marker on map */
      for(const m of mkrs){if(m._pd?.id===id){const el=m.getElement?.();if(el){const img=el.querySelector('img');if(img){img.onerror=null;img.src=newSrc;img.onerror=function(){this.src=FALLBACK}}}break}}
    }catch{}finally{_ri.delete(id)}
  }));
  if(_rq.size)setTimeout(pQ,200);else _rp=false;
}
function refreshVis(){
  if(!_tk)return;const b=map.getBounds();let q=0;
  for(const m of mkrs){if(q>=20)break;const p=m._pd;if(!p||!b.contains([p.lat,p.lng])||_ri.has(p.id)||_rq.has(p.id))continue;
    /* Check if URL is stale (>4h since fetch) */
    if(lc&&tUrls.has(p.id))continue;
    if(!p.fetchedAt||(Date.now()-new Date(p.fetchedAt).getTime())>4*3600*1000){_rq.add(p.id);q++}}
  if(q>0&&!_rp){_rp=true;setTimeout(pQ,50)}
}
let _vrt;map.on('moveend',()=>{clearTimeout(_vrt);_vrt=setTimeout(refreshVis,500)});

/* ===== DELTA SYNC ===== */
const DURL='https://graph.microsoft.com/v1.0/me/drive/root/delta?$select=id,name,webUrl,file,folder,photo,location,createdDateTime,lastModifiedDateTime,@microsoft.graph.downloadUrl&$top=200';
async function dsync(){
  _tk=await getTk();if(!_tk)return[];
  const ex=await dAll(),eM=new Map(ex.map(p=>[p.id,p])),eC=ex.length;
  let dl=await dM('deltaLink'),url=dl||DURL,isF=!dl;
  ssc('scanning',isF?'Premier scan…':'Synchro…',isF?'':eC+' en cache',2);
  let sc=0,ad=0,de=0,nd=null;const bat=[];
  while(url){
    const data=await gql(url,_tk);
    for(const it of(data.value||[])){
      sc++;if(sc%50===0)ssc('scanning',isF?`Analyse… ${sc}`:`Synchro… ${sc}`,isF?(eC+ad)+' trouvés':(ad>0?`+${ad}`:'…'),Math.min(5+sc*.005,95));
      if(it.deleted){if(eM.has(it.id)){eM.delete(it.id);await dDel(it.id);if(lc)tDel(it.id).catch(()=>{});de++}continue}
      if(it.folder||!isMF(it))continue;
      const la=it.location?.latitude,lo=it.location?.longitude;
      if(la==null||lo==null||(la===0&&lo===0)){if(!isF&&eM.has(it.id)){/* modified but no geo — skip */}continue}
      const tu=await getThUrl(it.id),dt=it.photo?.takenDateTime||it.createdDateTime;
      const mi={id:it.id,name:it.name,lat:+la,lng:+lo,date:dt?new Date(dt):null,thumbnailUrl:tu,downloadUrl:it['@microsoft.graph.downloadUrl']||tu,webUrl:it.webUrl,mediaType:isV(it.name)?'video':'image',fetchedAt:new Date().toISOString()};
      const isNew=!eM.has(it.id);
      eM.set(it.id,mi);bat.push(mi);if(isNew)ad++;
      if(lc&&tu)cacheThumb(mi).catch(()=>{});
      if(bat.length>=((eC+ad)<50?5:25)){await dPut(bat);bat.length=0;allP=[...eM.values()];updateUI(eC===0&&ad<=5)}
    }
    url=data['@odata.nextLink']||(nd=data['@odata.deltaLink']||null,null);
  }
  if(bat.length)await dPut(bat);if(nd)await dSM('deltaLink',nd);
  allP=[...eM.values()];updateUI(eC===0&&allP.length>0);
  await dSM('scan_state',{found:allP.length,at:new Date().toISOString()});
  if(isF)sDone(allP.length,allP.length+' médias');
  else if(ad||de){const p=[];if(ad)p.push('+'+ad);if(de)p.push('-'+de);sDone(allP.length,p.join(' ')+' · '+allP.length)}
  else sDone(allP.length,'à jour');
  if(lc)setTimeout(bgCache,2000);
  return allP;
}
async function bgSync(){if(bgRun)return;bgRun=true;try{await dsync()}catch(e){console.warn(e);ssc('error','Erreur','',0);setTimeout(()=>ssc('hidden'),4000)}finally{bgRun=false}}
function startAuto(){clearInterval(atm);atm=setInterval(()=>{if(_tk&&!bgRun)bgSync()},15*60*1000)}
function stopAuto(){clearInterval(atm)}

/* ===== SPATIAL ===== */
let si={};const CS=.0005;
function bSI(ph){si={};for(const p of ph){const k=Math.round(p.lat/CS)+','+Math.round(p.lng/CS);(si[k]||(si[k]=[])).push(p)}}
function near(lat,lng,fs){const cl=Math.round(lat/CS),cg2=Math.round(lng/CS),r=[];for(let i=-1;i<=1;i++)for(let j=-1;j<=1;j++){const c=si[(cl+i)+','+(cg2+j)];if(!c)continue;for(const p of c){if(fs&&!fs.has(p.id))continue;if(Math.abs(p.lat-lat)<CS&&Math.abs(p.lng-lng)<CS)r.push(p)}}return r}

/* ===== MARKERS ===== */
function mkM(p,fs){
  const s=thumbSrc(p),pid=p.id,nb=near(p.lat,p.lng,fs),sz=msz();
  const bd=nb.length>1?`<div class="photo-marker-count">${nb.length}</div>`:'';
  const ic=L.divIcon({className:'',
    html:`<div class="photo-marker-wrap"><div class="photo-marker"><img src="${s}" loading="lazy" data-pid="${pid}" onerror="this.src='${FALLBACK}';if(window.qR)qR('${pid}')"/>${bd}</div><div class="photo-marker-tail"></div></div>`,
    iconSize:[sz,sz+12],iconAnchor:[sz/2,sz+12]});
  const m=L.marker([p.lat,p.lng],{icon:ic});
  m.on('click',()=>{const np=near(p.lat,p.lng,fs);oPanel(np.length?np:[p],p.lat,p.lng)});
  m._pd=p;return m;
}
function rndr(fl){cg.off('clusterclick');cg.clearLayers();mkrs=[];bSI(allP);const fs=new Set(fl.map(p=>p.id));fl.forEach(p=>mkrs.push(mkM(p,fs)));cg.addLayers(mkrs);cg.on('clusterclick',e=>oPanel(e.layer.getAllChildMarkers().map(m=>m._pd),e.latlng.lat,e.latlng.lng))}

/* ===== PANEL ===== */
function oPanel(ph,lat,lng){
  panP=[...ph].sort((a,b)=>(b.date||0)-(a.date||0));
  const dt=panP.filter(p=>p.date).map(p=>p.date),dr=document.getElementById('panel-date-range');
  if(dt.length){const mn=new Date(Math.min(...dt)),mx=new Date(Math.max(...dt)),f=d=>d.toLocaleDateString('fr-FR',{month:'short',year:'numeric'});dr.textContent=mn.getFullYear()===mx.getFullYear()&&mn.getMonth()===mx.getMonth()?f(mn):f(mn)+' — '+f(mx)}else dr.textContent='';
  document.getElementById('panel-count').textContent=panP.length+' média'+(panP.length>1?'s':'');
  const loc=document.getElementById('panel-location-name');loc.textContent='…';
  geo(lat,lng).then(n=>loc.textContent=n);
  rPanel();document.getElementById('photo-panel').classList.add('open');
}
function rPanel(){
  const g=document.getElementById('panel-photos');g.innerHTML='';
  panP.forEach((p,i)=>{
    const c=document.createElement('div');c.className='thumb-card';
    const d=p.date?p.date.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'}):'';
    const im=document.createElement('img');im.src=thumbSrc(p);im.loading='lazy';im.alt=p.name;im.dataset.pid=p.id;
    im.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover';
    im.onerror=function(){this.src=FALLBACK;qR(p.id)};
    const o=document.createElement('div');o.className='thumb-overlay';o.innerHTML=esc(p.name)+'<br>'+d;
    c.appendChild(im);c.appendChild(o);
    c.addEventListener('click',()=>{lbP=panP;lbI=i;showLB()});
    g.appendChild(c);
  });
}

/* ===== LIGHTBOX ===== */
/*
 * CORE FIX: Always fetch fresh URLs from Graph API for the lightbox.
 * Show cached/fallback thumb immediately, then load HD via fresh downloadUrl.
 */
function showLB(){
  if(!lbP.length)return;
  const p=lbP[lbI],lb=document.getElementById('lightbox'),img=document.getElementById('lightbox-img'),vid=document.getElementById('lightbox-video');
  const hdL=document.getElementById('hd-loader'),hdD=document.getElementById('hd-done');
  img.style.display='none';vid.style.display='none';hdL.classList.remove('visible');hdD.classList.remove('visible');
  vid.onloadedmetadata=null;img.onload=null;img.onerror=null;
  vid.pause();try{vid.removeAttribute('src');vid.load()}catch{}
  const cid=p.id;

  if(p.mediaType==='video'){
    vid.style.display='block';
    if(_tk){
      hdL.classList.add('visible');
      fetchFullUrl(p.id).then(r=>{
        if(lbP[lbI]?.id!==cid)return;
        vid.src=r?.downloadUrl||p.downloadUrl||'';
        hdL.classList.remove('visible');
      }).catch(()=>{vid.src=p.downloadUrl||'';hdL.classList.remove('visible')});
    }else vid.src=p.downloadUrl||'';
  }else{
    /* Show thumb immediately */
    img.src=thumbSrc(p);img.style.display='block';
    img.onerror=()=>{img.src=FALLBACK};

    if(_tk){
      hdL.classList.add('visible');
      /* Fetch fresh thumb + full URL in parallel */
      Promise.all([fetchThumbBlob(p.id),fetchFullUrl(p.id)]).then(([blob,urls])=>{
        if(lbP[lbI]?.id!==cid)return;
        /* Update thumb if we got a blob */
        if(blob){
          const blobUrl=URL.createObjectURL(blob);
          img.src=blobUrl;
          /* Also update the photo's cached thumb */
          if(lc){tPut(p.id,blob).catch(()=>{});tUrls.set(p.id,blobUrl)}
        }
        /* Now load full res */
        const fullUrl=urls?.downloadUrl;
        if(fullUrl){
          const hd=new Image();
          hd.onload=()=>{if(lbP[lbI]?.id!==cid)return;img.src=hd.src;hdL.classList.remove('visible');hdD.classList.add('visible');setTimeout(()=>{if(lbP[lbI]?.id===cid)hdD.classList.remove('visible')},2000)};
          hd.onerror=()=>{hdL.classList.remove('visible')};
          hd.src=fullUrl;
        }else{hdL.classList.remove('visible')}
        /* Update stored URLs */
        if(urls){p.downloadUrl=urls.downloadUrl||p.downloadUrl;p.webUrl=urls.webUrl||p.webUrl;p.fetchedAt=new Date().toISOString();dPut([p]).catch(()=>{})}
      }).catch(()=>{hdL.classList.remove('visible')});
    }
  }

  document.getElementById('lightbox-name').textContent=p.name;
  const ds=p.date?p.date.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):'';
  document.getElementById('lightbox-meta').textContent=[ds,p.lat.toFixed(4)+', '+p.lng.toFixed(4)].filter(Boolean).join('  ·  ');
  const od=p.webUrl||p.downloadUrl;
  const ob=document.getElementById('lightbox-open-onedrive');
  if(od){ob.dataset.webUrl=od;ob.style.display='inline-flex'}else{delete ob.dataset.webUrl;ob.style.display='none'}
  document.getElementById('lightbox-prev').style.display=lbP.length>1?'flex':'none';
  document.getElementById('lightbox-next').style.display=lbP.length>1?'flex':'none';
  lb.classList.add('open');
}

/* ===== EVENTS ===== */
document.getElementById('panel-close').addEventListener('click',()=>document.getElementById('photo-panel').classList.remove('open'));
map.on('click',()=>document.getElementById('photo-panel').classList.remove('open'));
document.getElementById('lightbox-close').addEventListener('click',()=>document.getElementById('lightbox').classList.remove('open'));
document.getElementById('lightbox-prev').addEventListener('click',e=>{e.stopPropagation();lbI=(lbI-1+lbP.length)%lbP.length;showLB()});
document.getElementById('lightbox-next').addEventListener('click',e=>{e.stopPropagation();lbI=(lbI+1)%lbP.length;showLB()});
document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===document.getElementById('lightbox'))document.getElementById('lightbox').classList.remove('open')});
document.getElementById('lightbox-open-onedrive').addEventListener('click',e=>{e.stopPropagation();const u=e.currentTarget.dataset.webUrl;if(!u)return;if(/iPhone|iPad|iPod|Android/i.test(navigator.userAgent))location.href=u;else window.open(u,'_blank','noopener')});
document.addEventListener('keydown',e=>{const lb=document.getElementById('lightbox');if(!lb.classList.contains('open'))return;if(e.key==='Escape')lb.classList.remove('open');if(e.key==='ArrowLeft'){lbI=(lbI-1+lbP.length)%lbP.length;showLB()}if(e.key==='ArrowRight'){lbI=(lbI+1)%lbP.length;showLB()}});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('photo-panel').classList.remove('open')});
(function(){let sx=0,sy=0;const T=50,lb=document.getElementById('lightbox');
lb.addEventListener('touchstart',e=>{sx=e.changedTouches[0].screenX;sy=e.changedTouches[0].screenY},{passive:true});
lb.addEventListener('touchend',e=>{const dx=e.changedTouches[0].screenX-sx,dy=e.changedTouches[0].screenY-sy;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>T){lbI=dx<0?(lbI+1)%lbP.length:(lbI-1+lbP.length)%lbP.length;showLB()}else if(dy>T*1.5&&Math.abs(dy)>Math.abs(dx))lb.classList.remove('open')},{passive:true});
const ph=document.querySelector('.panel-header');let py=0;
ph.addEventListener('touchstart',e=>{py=e.changedTouches[0].screenY},{passive:true});
ph.addEventListener('touchend',e=>{if(e.changedTouches[0].screenY-py>60)document.getElementById('photo-panel').classList.remove('open')},{passive:true})})();

/* ===== GEOCODING ===== */
const gc={};let glt=0;
async function geo(lat,lng,rt=0){const k=lat.toFixed(2)+','+lng.toFixed(2);if(gc[k])return gc[k];const w=Math.max(0,1100-(Date.now()-glt));if(w>0)await new Promise(r=>setTimeout(r,w));glt=Date.now();try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=fr`,{headers:{'User-Agent':'PhotoMap/1.0'}});if(r.status===429){if(rt<3){await new Promise(y=>setTimeout(y,(2**rt)*1500));return geo(lat,lng,rt+1)}throw 0}if(!r.ok)throw 0;const d=await r.json(),a=d.address||{},n=a.city||a.town||a.village||a.county||a.state||a.country||'?',c=a.country||'';const res=c&&n!==c?n+', '+c:n;gc[k]=res;return res}catch{return lat.toFixed(3)+'°, '+lng.toFixed(3)+'°'}}

/* ===== YEARS ===== */
let yfi=false;
function bldYr(ph){const yrs=[...new Set(ph.filter(p=>p.date).map(p=>p.date.getFullYear()))].sort((a,b)=>b-a);const bar=document.getElementById('filter-bar');bar.innerHTML='<span class="filter-label">Année</span><button class="year-btn'+(curY==='all'?' active':'')+'" data-year="all">Toutes</button>';yrs.forEach(y=>{const b=document.createElement('button');b.className='year-btn'+(curY==y?' active':'');b.dataset.year=y;b.textContent=y;bar.appendChild(b)});bar.classList.add('visible');if(!yfi){yfi=true;bar.addEventListener('click',e=>{const b=e.target.closest('.year-btn');if(!b)return;bar.querySelectorAll('.year-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');curY=b.dataset.year;aF()})}}
function aF(){const f=curY==='all'?allP:allP.filter(p=>p.date&&p.date.getFullYear()==curY);rndr(f);uSt(f.length);document.getElementById('photo-panel').classList.remove('open')}
function uSt(c){const e=document.getElementById('stats-pill');e.textContent=c+' média'+(c>1?'s':'')+' géolocalisé'+(c>1?'s':'');e.style.display='block'}

/* ===== STARTUP ===== */
async function startApp(){if(startRun)return;startRun=true;try{await _start()}finally{startRun=false}}
async function _start(){
  const cid=localStorage.getItem('photomap_client_id')||CID_DEFAULT;
  document.getElementById('splash').classList.add('hidden');
  try{const c=await dAll();if(c.length){allP=c;if(lc)await loadThumbs();updateUI(true)}}catch{}
  document.getElementById('btn-config').style.display='inline-flex';document.getElementById('map-layer-toggle').classList.add('visible');
  ssc('scanning','Connexion…','',0);
  try{
    await initMs(cid);await ms.handleRedirectPromise();
    ssc('scanning','Authentification…','',3);
    const t=await getTk();if(!t)return;_tk=t;
    bgSync();startAuto();
  }catch(e){console.error(e);ssc('error','Erreur','',0);setTimeout(()=>ssc('hidden'),6000);toast('Erreur: '+e.message,8000)}
}

/* ===== CONFIG ===== */
function showCfg(){const h=ms&&ms.getAllAccounts().length>0;document.getElementById('config-rescan-wrap').style.display=h?'block':'none';document.getElementById('config-logout-wrap').style.display=h?'block':'none';document.getElementById('toggle-local-cache').checked=lc;uCS();if(lc)tIds().then(ids=>cStat(ids.size,allP.length)).catch(()=>{});document.getElementById('config-panel').classList.add('open')}
function uCS(){document.getElementById('cache-toggle-sub').textContent=lc?'Activé — vignettes hors-ligne':'Désactivé — chargement à la volée'}
document.getElementById('toggle-local-cache').addEventListener('change',async e=>{lc=e.target.checked;localStorage.setItem(LC,lc?'true':'false');uCS();if(lc){toast('Cache activé — téléchargement…',4000);cStat(0,allP.length);bgCache()}else{for(const[,u]of tUrls)try{URL.revokeObjectURL(u)}catch{}tUrls.clear();await tClr().catch(()=>{});document.getElementById('cache-toggle-status').textContent='';toast('Cache désactivé')}});
document.getElementById('btn-config-cancel').addEventListener('click',()=>document.getElementById('config-panel').classList.remove('open'));
document.getElementById('btn-config-logout').addEventListener('click',async()=>{try{if(ms){const a=ms.getAllAccounts();if(a.length){await ms.logoutRedirect({account:a[0]}).catch(()=>{});return}}}finally{localStorage.removeItem('photomap_client_id');await dClr().catch(()=>{});await tClr().catch(()=>{});await dDM('scan_state').catch(()=>{});await dDM('deltaLink').catch(()=>{});for(const[,u]of tUrls)try{URL.revokeObjectURL(u)}catch{}tUrls.clear();stopAuto();ms=null;allP=[];mkrs=[];cg.clearLayers();document.getElementById('config-panel').classList.remove('open');document.getElementById('filter-bar').classList.remove('visible');document.getElementById('stats-pill').style.display='none';document.getElementById('btn-config').style.display='none';document.getElementById('map-layer-toggle').classList.remove('visible');document.getElementById('photo-panel').classList.remove('open');document.getElementById('splash').classList.remove('hidden');ssc('hidden');toast('Déconnecté')}});
document.getElementById('btn-config').addEventListener('click',showCfg);
document.getElementById('btn-login').addEventListener('click',()=>{if(!localStorage.getItem('photomap_client_id'))localStorage.setItem('photomap_client_id',CID_DEFAULT);startApp()});
document.getElementById('btn-connect').addEventListener('click',()=>{document.getElementById('config-panel').classList.remove('open');startApp()});
document.getElementById('btn-full-rescan').addEventListener('click',async()=>{document.getElementById('config-panel').classList.remove('open');await dDM('deltaLink').catch(()=>{});await dDM('scan_state').catch(()=>{});bgSync()});
document.getElementById('config-panel').addEventListener('click',e=>{if(e.target===document.getElementById('config-panel'))document.getElementById('config-panel').classList.remove('open')});

/* ===== INIT ===== */
document.addEventListener('DOMContentLoaded',async()=>{
  const cid=localStorage.getItem('photomap_client_id')||CID_DEFAULT;
  const hs=location.hash+location.search;
  const isR=hs.includes('code=')||hs.includes('access_token')||hs.includes('id_token')||hs.includes('error=');
  try{const c=await dAll();if(c.length){allP=c;if(lc)await loadThumbs();updateUI(true);document.getElementById('btn-config').style.display='inline-flex';document.getElementById('map-layer-toggle').classList.add('visible');document.getElementById('splash').classList.add('hidden');if(cid&&!isR)silSync(cid)}}catch{}
  if(cid&&isR)startApp();
});
async function silSync(cid){try{if(!ms){await initMs(cid);await ms.handleRedirectPromise()}const a=ms.getAllAccounts();if(!a.length)return;const r=await ms.acquireTokenSilent({scopes:['Files.Read','User.Read'],account:a[0]});_tk=r.accessToken;bgSync();startAuto()}catch{}}
